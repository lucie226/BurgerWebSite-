<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger King</title>
    <link rel="stylesheet" href="style.css">

    <!-- 
      On remplace l'ancien kit (souvent défectueux) 
      par le CDN officiel et gratuit de FontAwesome 6.
    -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <!-- ========== EN-TÊTE ========== -->
    <header>
        <!-- Menu hamburger (version mobile) -->
        <div class="menu">
            <img src="./images/menu.png" class="menu_icons" alt="Icône menu">
            <ul>
                <li><a href="#">Notre carte</a></li>
                <li><a href="#">Le Coin Famille</a></li>
                <li><a href="#">Recrutez-Nous !</a></li>
                <li><a href="#">Burger Kara</a></li>
            </ul>
        </div>

        <!-- Logo Burger King -->
        <img src="./images/burger-king.png" class="logo" alt="Logo Burger King">

        <!-- Bloc de droite : icônes + bouton -->
        <div class="header-end">
            <!-- 
              Icône de géolocalisation.
              Les classes "fa-solid fa-location-dot" sont maintenant supportées
              par le CDN officiel.
            -->
            <i class="fa-solid fa-location-dot" aria-label="Trouver le restaurant"></i>

            <!-- Icône de couronne (fidélité) -->
            <i class="fa-solid fa-crown " aria-label="Geolocalisation"></i>

            <!-- Bouton Click & Collect -->
            <button >
                    
               <p>Click & Collect</p><img src="./images/click_collect.png" class="Click">
                
            </button>
        </div>
    </header>
    <!-- FIN de l'en-tête -->
     <section class="home">
        <div class="image-container">
           <img src="./images/img1.webp" alt="home">
           <button> <b>Decrouvrez le!</b></button>
        </div>
        

     </section>

</body>
</html>
